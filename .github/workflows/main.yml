name: BrainAI Industrial PDF Build

on: 
  push:
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Industrial Rendering Stack
        run: |
          npm install -g md-to-pdf
          sudo apt-get update
          sudo apt-get install -y libgbm1 libasound2t64 || sudo apt-get install -y libasound2

      - name: Create Build Directories
        run: |
          mkdir -p build/de
          mkdir -p build/en

      - name: Render Industrial PDFs
        run: |
          # 1. Stabile Grund-Config für Puppeteer/Chromium
          cat <<EOF > runner-config.js
          module.exports = {
            stylesheet: './docs/style.css',
            pdf_options: {
              format: 'A4',
              margin: '20mm',
              printBackground: true
            },
            launch_options: {
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-gpu']
            }
          };
EOF

          for f in docs/*.md; do
            # Falls der docs/ Ordner leer ist, Schleife abbrechen
            [ -e "$f" ] || continue
            
            filename=$(basename "$f" .md)
            
            # Wir ignorieren die README.md
            if [ "$filename" = "README" ]; then continue; fi

            # 2. Spracherkennung und Basis-Variablen initialisieren
            LANG="de" # Fallback auf Deutsch
            HEADER_PROD="PRODUKT-DOKUMENTATION"
            CLASSIFICATION="ÖFFENTLICHE KLASSIFIZIERUNG"
            ACCESS_LEVEL="Zugriffsstufe: Öffentlich / Beta"

            if [[ "$filename" == *"_Int"* ]] || [[ "$filename" == *"_int"* ]] || [[ "$filename" == *"wasm_serverconfig"* ]]; then
              LANG="en"
              HEADER_PROD="PRODUCT DOCUMENTATION"
              CLASSIFICATION="PUBLIC CLASSIFICATION"
              ACCESS_LEVEL="Access Level: Public / Beta"
            fi

            # 3. Präzises Title-Mapping (Zentral gesteuert)
            case "$filename" in
              *Lizenz*) 
                DOC_TITLE="Master License Agreement (EULA)"
                DOC_SUBTITLE="LEGAL & COMPLIANCE SPECIFICATION"
                ;;
              *wasm_serverconfig*) 
                DOC_TITLE="Server Integration & Hardening Guide"
                DOC_SUBTITLE="WASM & CLOUD DEPLOYMENT SPEC"
                ;;
              *ProKey_CLI_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProKey Kommandozeilen-Referenz" || echo "ProKey Command Line Reference")
                DOC_SUBTITLE="CLI & AUTOMATION"
                ;;
              *ProKey_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProKey Integrations-Handbuch" || echo "ProKey Integration Guide")
                DOC_SUBTITLE="API & WRAPPER SUITE"
                ;;
              *ProHash_CLI_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProHash Kommandozeilen-Referenz" || echo "ProHash Command Line Reference")
                DOC_SUBTITLE="CLI & AUTOMATION"
                ;;
              *ProHash_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProHash Integrations-Handbuch" || echo "ProHash Integration Guide")
                DOC_SUBTITLE="API & WRAPPER SUITE"
                ;;
              *ProHash_Hardware*) 
                DOC_TITLE="FPGA & ASIC IP Core Guide"
                DOC_SUBTITLE="HARDWARE ACCELERATED HASHING"
                ;;
              *ProED_CLI_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProED Engine CLI Referenz" || echo "ProED Engine CLI Reference")
                DOC_SUBTITLE="KERNEL & USERSPACE ENCRYPTION"
                ;;
              *ProED_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProED Engine Handbuch" || echo "ProED Engine Manual")
                DOC_SUBTITLE="CORE ARCHITECTURE"
                ;;
              *ProEDC_CLI_Editions*) 
                DOC_TITLE="ProEDC Editionen & Lizenzen"
                DOC_SUBTITLE="OVERVIEW & FEATURE MATRIX"
                ;;
              *ProEDC_CLI_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProEDC CLI Referenz" || echo "ProEDC CLI Reference")
                DOC_SUBTITLE="INDUSTRIAL ENCRYPTION SUITE"
                ;;
              *ProEDC_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProEDC System Integrations-Handbuch" || echo "ProEDC System Integration Guide")
                DOC_SUBTITLE="INDUSTRIAL ENCRYPTION SUITE"
                ;;
              *ProChat_Hand*) 
                DOC_TITLE=$([ "$LANG" = "de" ] && echo "ProChat System-Handbuch" || echo "ProChat System Manual")
                DOC_SUBTITLE="ZERO-TRUST COMMUNICATION"
                ;;
              *) 
                DOC_TITLE="Technical Documentation"
                DOC_SUBTITLE="PROSUITE INDUSTRIAL"
                ;;
            esac

            echo "Assembling [$LANG]: $filename"

            # 4. Den Header dynamisch generieren (Cover + Tabelle - Zweisprachig)
            # WICHTIG: Das EOF am Ende darf KEINE Leerzeichen davor haben!
            cat <<EOF > header.tmp
            <div style="height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; font-family: 'Inter', sans-serif;">
              <h1 style="font-size: 50px; margin-bottom: 0; letter-spacing: -1px;">ProSuite Industrial</h1>
              <p style="font-size: 22px; color: #555; margin-top: 10px;">$DOC_SUBTITLE</p>
              <div style="margin-top: 120px; border-top: 1px solid #ddd; width: 60%; padding-top: 20px;">
                <strong>$HEADER_PROD</strong><br>
                <span style="color: #666;">BrainAI UG (haftungsbeschränkt)</span>
              </div>
            </div>

            <div style="page-break-after: always;"></div>

            | BrainAI UG (haftungsbeschränkt) | **PROSUITE INDUSTRIAL** | 🟢 **$CLASSIFICATION** |
            | :--- | :---: | ---: |
            | Core Architecture & Development | **$DOC_TITLE** | $ACCESS_LEVEL |

            ---
EOF

            # 5. Zusammenkleben: Header + Original-Inhalt
            cat header.tmp "$f" > "working_${filename}.md"

            # 6. Rendering
            md-to-pdf "working_${filename}.md" --config-file runner-config.js
            
            # 7. Aufräumen & Sortieren
            if [ "$LANG" = "de" ]; then
                mv "working_${filename}.pdf" "build/de/${filename}.pdf"
            else
                mv "working_${filename}.pdf" "build/en/${filename}.pdf"
            fi
            
            rm "working_${filename}.md"
            rm header.tmp
          done

      - name: Archive German Docs
        uses: actions/upload-artifact@v4
        with:
          name: ProSuite-Manuals-DE
          path: build/de/*.pdf

      - name: Archive International Docs
        uses: actions/upload-artifact@v4
        with:
          name: ProSuite-Manuals-EN
          path: build/en/*.pdf
